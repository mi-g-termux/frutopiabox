<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shop fresh, premium products online — fast delivery, easy checkout." />
    <meta name="theme-color" content="#10b981" />
    <title>Loading...</title>
    <script>
      // Immediately restore store name from localStorage before React loads
      // This prevents new users seeing "Quirky Fruity" flash in the tab
      try {
        var s = localStorage.getItem('qf_siteSettings');
        if (s) {
          var parsed = JSON.parse(s);
          if (parsed.siteTitle) document.title = parsed.siteTitle;
          else if (parsed.websiteName) document.title = parsed.websiteName;
        }
      } catch(e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
